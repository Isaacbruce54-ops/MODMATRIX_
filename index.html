    <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MODMATRIX Store</title>

<style>

body{
margin:0;
font-family:Arial;
background:#05060b;
color:white;
}

header{
padding:20px;
text-align:center;
border-bottom:1px solid cyan;
}

header h1{
color:#00f0ff;
letter-spacing:2px;
}

nav{
margin-top:10px;
}

nav a{
color:white;
margin:10px;
text-decoration:none;
font-weight:bold;
}

nav a:hover{
color:#00f0ff;
}

main{
max-width:1100px;
margin:auto;
padding:30px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:#0b1120;
padding:20px;
border-radius:10px;
box-shadow:0 0 15px #00f0ff20;
}

.price{
color:#00f0ff;
font-size:22px;
margin:10px 0;
}

button{
padding:10px 15px;
background:#00f0ff;
border:none;
border-radius:5px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#00c6d3;
}

.admin{
margin-top:50px;
padding:20px;
background:#0b1120;
border-radius:10px;
}

.admin input{
width:100%;
padding:10px;
margin-top:10px;
border:none;
background:#05060b;
color:white;
}

</style>
</head>

<body>

<header>

<h1>MODMATRIX</h1>
<p>Cyber Digital Marketplace</p>

<nav>
<a href="#">Home</a>
<a href="#store">Store</a>
<a href="#admin">Admin Panel</a>
</nav>

</header>

<main>

<h2 id="store">Products</h2>

<div class="products" id="productList"></div>

<div class="admin" id="admin">

<h2>Admin Panel</h2>

<input id="title" placeholder="Product name">
<input id="price" placeholder="Price">
<input id="desc" placeholder="Description">

<button onclick="addProduct()">Add Product</button>

</div>

</main>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [];

function renderProducts(){

let container = document.getElementById("productList");

container.innerHTML="";

products.forEach(p =>{

let card = document.createElement("div");

card.className="card";

card.innerHTML = `
<h3>${p.title}</h3>
<p>${p.desc}</p>
<div class="price">$${p.price}</div>
<button>Buy</button>
`;

container.appendChild(card);

});

}

function addProduct(){

let title = document.getElementById("title").value;
let price = document.getElementById("price").value;
let desc = document.getElementById("desc").value;

products.push({
title:title,
price:price,
desc:desc
});

localStorage.setItem("products",JSON.stringify(products));

renderProducts();

}

renderProducts();

</script>

</body>
</html>
